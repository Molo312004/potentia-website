<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Potentia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Dashboard Specific Styles */
        .dashboard-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a8a 0%, #0f2463 100%);
            padding: 20px;
        }

        .dashboard-header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            color: #1e3a8a;
            margin: 0;
            font-size: 32px;
        }

        .logout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #b71c1c;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            color: #1e3a8a;
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        }

        .registrations-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .registrations-section h2 {
            color: #1e3a8a;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .search-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-filter input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .search-filter input:focus {
            outline: none;
            border-color: #1e3a8a;
            box-shadow: 0 0 5px rgba(30, 58, 138, 0.1);
        }

        .export-btn {
            background: #1a6b3b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .export-btn:hover {
            background: #0f4620;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .registrations-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .registrations-table thead {
            background: #f5f5f5;
            border-bottom: 2px solid #1e3a8a;
        }

        .registrations-table th {
            padding: 15px;
            text-align: left;
            color: #1e3a8a;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .registrations-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #333;
            font-size: 14px;
        }

        .registrations-table tbody tr:hover {
            background: #f9f9f9;
            transition: background 0.3s;
        }

        .registrations-table tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .sr-no {
            color: #1e3a8a;
            font-weight: 600;
        }

        .email-cell {
            color: #0066cc;
            text-decoration: none;
        }

        .email-cell:hover {
            text-decoration: underline;
        }

        .phone-cell {
            font-weight: 500;
        }

        .date-cell {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3a8a;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: white;
            color: #1e3a8a;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .pagination button.active {
            background: #1e3a8a;
            color: white;
        }

        .pagination button:hover {
            background: #1e3a8a;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .dashboard-header h1 {
                font-size: 24px;
            }

            .search-filter {
                flex-direction: column;
            }

            .search-filter input {
                min-width: 100%;
            }

            .registrations-table {
                font-size: 12px;
            }

            .registrations-table th,
            .registrations-table td {
                padding: 10px;
            }

            .stats-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .admin-user {
            color: #1e3a8a;
            font-weight: 600;
        }
        
        .marks-cell {
            font-weight: 500;
            color: #666;
        }
        
        .marks-value {
            color: #1a6b3b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p class="admin-user">Welcome, <span id="adminUsername">Admin</span></p>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Registrations</h3>
                <p class="number" id="totalRegistrations">0</p>
            </div>
            <div class="stat-card">
                <h3>Today's Registrations</h3>
                <p class="number" id="todayRegistrations">0</p>
            </div>
            <div class="stat-card">
                <h3>This Month</h3>
                <p class="number" id="monthRegistrations">0</p>
            </div>
        </div>

        <!-- Registrations Section -->
        <div class="registrations-section">
            <h2>All Registrations</h2>

            <!-- Search and Filter -->
            <div class="search-filter">
                <input type="text" id="searchInput" placeholder="Search by name, email, or phone..." onkeyup="filterTable()">
                <button class="export-btn" onclick="exportToCSV()">Export to CSV</button>
            </div>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="registrations-table" id="registrationsTable">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>School</th>
                            <th>Physics</th>
                            <th>Chemistry</th>
                            <th>Biology</th>
                            <th>Registration Date & Time</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="loading">
                            <td colspan="6">
                                <div class="spinner"></div>
                                Loading registrations...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- No Data Message -->
            <div id="noDataMessage" class="no-data" style="display: none;">
                No registrations found.
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Check if admin is logged in
        function checkAdminLogin() {
            const adminToken = localStorage.getItem("adminToken");
            if (!adminToken) {
                // Redirect to home page if not logged in
                window.location.href = "index.html";
                return false;
            }
            
            // Validate token with backend
            validateTokenWithBackend(adminToken);
            return true;
        }

        // Validate token with backend
        function validateTokenWithBackend(token) {
            fetch(CONFIG.API_BASE_URL + "/api/admin/validate-token", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })
            .then(response => {
                if (!response.ok && response.status === 401) {
                    // Token is invalid or expired
                    clearAdminSession();
                    window.location.href = "index.html";
                }
            })
            .catch(error => {
                console.error("Error validating token:", error);
            });
        }

        // Load registrations on page load
        document.addEventListener("DOMContentLoaded", function() {
            if (checkAdminLogin()) {
                const adminUsername = localStorage.getItem("adminUsername");
                document.getElementById("adminUsername").textContent = adminUsername || "Admin";
                loadRegistrations();
            }
        });

        // Fetch all registrations from backend
        function loadRegistrations() {
            const tableBody = document.getElementById("tableBody");
            const noDataMessage = document.getElementById("noDataMessage");
            const adminToken = localStorage.getItem("adminToken");

            fetch(CONFIG.API_BASE_URL + "/api/registrations/all", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + adminToken,
                    "Content-Type": "application/json"
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch registrations");
                    }
                    return response.json();
                })
                .then(data => {
                    tableBody.innerHTML = "";
                    noDataMessage.style.display = "none";

                    if (data && data.length > 0) {
                        // Display all registrations
                        data.forEach((registration, index) => {
                            const row = document.createElement("tr");
                            const date = new Date(registration.registrationTime);
                            const formattedDate = date.toLocaleDateString("en-IN", {
                                year: "numeric",
                                month: "short",
                                day: "numeric"
                            });
                            const formattedTime = date.toLocaleTimeString("en-IN", {
                                hour: "2-digit",
                                minute: "2-digit",
                                second: "2-digit"
                            });

                            // Fetch test results for this user
                            const physicsMarks = document.createElement("td");
                            const chemistryMarks = document.createElement("td");
                            const biologyMarks = document.createElement("td");
                            
                            physicsMarks.className = "marks-cell";
                            chemistryMarks.className = "marks-cell";
                            biologyMarks.className = "marks-cell";
                            
                            physicsMarks.textContent = "NA";
                            chemistryMarks.textContent = "NA";
                            biologyMarks.textContent = "NA";
                            
                            // Fetch marks for each subject
                            fetchUserTestResults(registration.email, "Physics", physicsMarks, 80);
                            fetchUserTestResults(registration.email, "Chemistry", chemistryMarks, 80);
                            fetchUserTestResults(registration.email, "Biology", biologyMarks, 200);

                            row.innerHTML = `
                                <td class="sr-no">${index + 1}</td>
                                <td>${escapeHtml(registration.fullName)}</td>
                                <td><a href="mailto:${registration.email}" class="email-cell">${escapeHtml(registration.email)}</a></td>
                                <td class="phone-cell">${escapeHtml(registration.phone)}</td>
                                <td>${escapeHtml(registration.school)}</td>
                            `;
                            row.appendChild(physicsMarks);
                            row.appendChild(chemistryMarks);
                            row.appendChild(biologyMarks);
                            
                            const dateCell = document.createElement("td");
                            dateCell.className = "date-cell";
                            dateCell.innerHTML = `${formattedDate} <br> ${formattedTime}`;
                            row.appendChild(dateCell);
                            
                            tableBody.appendChild(row);
                        });

                        // Update statistics
                        updateStats(data);
                    } else {
                        noDataMessage.style.display = "block";
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    tableBody.innerHTML = '<tr><td colspan="9" class="no-data">Error loading registrations. Make sure the backend is running on ' + CONFIG.API_BASE_URL + '</td></tr>';
                    noDataMessage.style.display = "block";
                });
        }
        
        // Fetch test results for a user
        function fetchUserTestResults(email, testType, cellElement, maxMarks) {
            const adminToken = localStorage.getItem("adminToken");
            
            fetch(`${CONFIG.API_BASE_URL}/api/test-results/by-email/${email}/test/${testType}`, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + adminToken,
                    "Content-Type": "application/json"
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data && data.data && data.data.length > 0) {
                    const latestResult = data.data[data.data.length - 1];
                    cellElement.textContent = `${latestResult.totalMarks}/${maxMarks}`;
                    cellElement.className = "marks-cell marks-value";
                } else {
                    cellElement.textContent = "NA";
                    cellElement.className = "marks-cell";
                }
            })
            .catch(error => {
                console.error(`Error fetching ${testType} results:`, error);
                cellElement.textContent = "NA";
                cellElement.className = "marks-cell";
            });
        }

        // Update statistics
        function updateStats(registrations) {
            const today = new Date();
            const thisMonth = new Date(today.getFullYear(), today.getMonth(), 1);

            let todayCount = 0;
            let monthCount = 0;

            registrations.forEach(reg => {
                const regDate = new Date(reg.registrationTime);
                if (regDate.toDateString() === today.toDateString()) {
                    todayCount++;
                }
                if (regDate >= thisMonth) {
                    monthCount++;
                }
            });

            document.getElementById("totalRegistrations").textContent = registrations.length;
            document.getElementById("todayRegistrations").textContent = todayCount;
            document.getElementById("monthRegistrations").textContent = monthCount;
        }

        // Filter table by search input
        function filterTable() {
            const searchInput = document.getElementById("searchInput").value.toLowerCase();
            const tableBody = document.getElementById("tableBody");
            const rows = tableBody.getElementsByTagName("tr");

            let visibleCount = 0;
            for (let row of rows) {
                const text = row.textContent.toLowerCase();
                if (text.includes(searchInput)) {
                    row.style.display = "";
                    visibleCount++;
                } else {
                    row.style.display = "none";
                }
            }

            // Show no data message if no rows are visible
            const noDataMessage = document.getElementById("noDataMessage");
            if (visibleCount === 0 && searchInput) {
                noDataMessage.style.display = "block";
                noDataMessage.textContent = "No registrations match your search.";
            } else if (visibleCount === 0) {
                noDataMessage.style.display = "block";
            } else {
                noDataMessage.style.display = "none";
            }
        }

        // Export table to CSV
        function exportToCSV() {
            const table = document.getElementById("registrationsTable");
            let csv = [];
            let rows = table.querySelectorAll("tr");

            rows.forEach(row => {
                let rowData = [];
                let cells = row.querySelectorAll("td, th");
                cells.forEach(cell => {
                    rowData.push('"' + cell.textContent.trim().replace(/"/g, '""') + '"');
                });
                csv.push(rowData.join(","));
            });

            let csvContent = csv.join("\n");
            let link = document.createElement("a");
            link.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csvContent);
            link.download = "registrations_" + new Date().toISOString().slice(0, 10) + ".csv";
            link.click();
        }

        // Logout function
        function handleLogout() {
            if (confirm("Are you sure you want to logout?")) {
                const adminToken = localStorage.getItem("adminToken");
                
                // Call backend logout endpoint
                fetch(CONFIG.API_BASE_URL + "/api/admin/logout", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + adminToken,
                        "Content-Type": "application/json"
                    }
                })
                .then(() => {
                    clearAdminSession();
                    window.location.href = "index.html";
                })
                .catch(error => {
                    console.error("Logout error:", error);
                    clearAdminSession();
                    window.location.href = "index.html";
                });
            }
        }

        // Clear admin session from localStorage
        function clearAdminSession() {
            localStorage.removeItem("adminToken");
            localStorage.removeItem("adminUsername");
            localStorage.removeItem("adminEmail");
            localStorage.removeItem("adminId");
            localStorage.removeItem("adminLoggedIn");
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
